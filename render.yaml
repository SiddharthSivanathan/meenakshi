services:
  - type: web
    name: meenaakshi-cafe-feedback-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    autoDeploy: true
    envVars:
      - key: FLASK_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase: DATABASE_URL
